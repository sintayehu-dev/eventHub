name: eventhub
description: "ETHIO EVENTS - Your event management platform."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.5.4


dependencies:
  bloc: ^8.1.4
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.6
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0
  get_it: ^8.0.3
  freezed_annotation: ^2.4.4
  connectivity_plus: ^6.1.2
  dio: ^5.8.0+1
  go_router: ^14.7.2
  shared_preferences: ^2.5.1
  fluttertoast: ^8.2.11
  google_fonts: ^6.2.1
  flutter_screenutil: ^5.9.3
  dartz: ^0.10.1
  json_annotation: ^4.9.0
  flutter_native_splash: ^2.4.4
  injectable: ^2.5.0
  image_picker: ^1.0.7
  permission_handler: ^11.3.0
  device_info_plus: ^9.1.1
  cloudinary: ^1.1.0
  google_sign_in: ^6.2.1
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0
  firebase_storage: ^12.3.6
  mobile_scanner: ^5.2.3
  qr_flutter: ^4.1.0
  smooth_page_indicator: ^1.2.1


dev_dependencies:
  bloc_test: ^9.1.7
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  very_good_analysis: ^6.0.0
  injectable_generator: ^2.5.0
  flutter_lints: ^4.0.0
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/eventhub_logo.png"
  min_sdk_android: 21 
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/eventhub_logo.png"
    background_color: "#hexcode"
    theme_color: "#hexcode"
  windows:
    generate: true
    image_path: "assets/eventhub_logo.png"
    icon_size: 48 
  macos:
    generate: true
    image_path: "assets/eventhub_logo.png"