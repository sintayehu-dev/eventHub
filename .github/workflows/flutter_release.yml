name: Flutter Release Build

# Trigger when code is pushed to the dev branch
on:
  push:
    branches:
      - dev

jobs:
  build-and-release:
    name: Build APK and Create Release
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Checkout the repository code
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      # Step 2: Set up Java (required for Android builds)
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      # Step 3: Install Flutter (matching local version)
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.27.4'
          cache: true
          
      # Step 4: Cache Flutter dependencies for faster builds
      - name: Cache Flutter Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-
            
      # Step 5: Verify Flutter installation
      - name: Verify Flutter Installation
        run: flutter doctor -v
        
      # Step 6: Clean previous build cache
      - name: Clean Build Cache
        run: flutter clean
        
      # Step 6.5: Create missing directories
      - name: Create Assets Directory
        run: mkdir -p assets/images
        
      # Step 7: Install dependencies with conflict resolution
      - name: Install Dependencies
        run: |
          # Try normal pub get first
          flutter pub get || {
            echo "Normal pub get failed, trying with major version upgrades..."
            flutter pub upgrade --major-versions || {
              echo "Major version upgrade failed, cleaning and retrying..."
              flutter clean
              rm -f pubspec.lock
              flutter pub get
            }
          }
        
      # Step 8: Generate code (REQUIRED for Freezed, JSON, etc.)
      - name: Generate Code
        run: flutter pub run build_runner build --delete-conflicting-outputs
        
      # Step 9: Build release APK
      - name: Build Release APK
        run: flutter build apk --release
        
      # Step 10: Verify APK was created
      - name: Verify APK Build
        run: |
          if [ -f "build/app/outputs/flutter-apk/app-release.apk" ]; then
            echo "✅ APK built successfully"
            ls -lh build/app/outputs/flutter-apk/app-release.apk
          else
            echo "❌ APK build failed"
            exit 1
          fi
          
      # Step 11: Create GitHub Release and upload APK
      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v1
        with:
          name: Dev Build ${{ github.sha }}
          tag_name: dev-build-${{ github.run_number }}
          generate_release_notes: true
          files: build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: true
          body: |
            🚀 Automated Dev Build
            
            Commit: ${{ github.sha }}
            Branch: dev
            
            Download the APK below to install.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}