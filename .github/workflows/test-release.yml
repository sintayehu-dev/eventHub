name: Test Release Creation

# Manual workflow to test release creation without rebuilding APK
on:
  workflow_dispatch:
    inputs:
      build_number:
        description: 'Build number of existing APK artifact to use'
        required: true
        type: string
      release_notes:
        description: 'Release notes (optional)'
        required: false
        default: 'Testing release creation'
        type: string

env:
  FLUTTER_VERSION: '3.27.4'
  JAVA_VERSION: '17'

# Permissions for GitHub token
permissions:
  contents: write                  # Required to create releases
  actions: read                    # Required to download artifacts

jobs:
  test-release:
    name: Test Release Creation
    runs-on: ubuntu-latest
    
    steps:
    # Step 1: Get source code for release info
    - name: Checkout code
      uses: actions/checkout@v4
      
    # Step 2: Download existing APK artifact
    - name: Download APK artifact
      uses: actions/download-artifact@v4
      with:
        name: eventhub-ft-clean-release-${{ github.event.inputs.build_number }}
        path: release-files/
        
    # Step 3: Check downloaded files
    - name: Prepare release files
      run: |
        echo "Contents of release-files directory:"
        ls -la release-files/
        # Find the APK file
        APK_FILE=$(find release-files/ -name "*.apk" -type f | head -1)
        if [ -z "$APK_FILE" ]; then
          echo "Error: No APK file found in release-files/"
          echo "Available artifacts for build ${{ github.event.inputs.build_number }}:"
          exit 1
        fi
        echo "Found APK file: $APK_FILE"
        # Verify the expected file exists
        EXPECTED_NAME="release-files/eventhub-ft-clean-release-${{ github.event.inputs.build_number }}.apk"
        if [ ! -f "$EXPECTED_NAME" ]; then
          echo "Error: Expected APK file not found at $EXPECTED_NAME"
          echo "Available files:"
          ls -la release-files/
          exit 1
        fi
        echo "APK file confirmed: $EXPECTED_NAME"
        
    # Step 4: Get version from pubspec.yaml
    - name: Get version info
      id: version
      run: |
        if [ ! -f "pubspec.yaml" ]; then
          echo "Error: pubspec.yaml not found"
          exit 1
        fi
        VERSION=$(grep '^version:' pubspec.yaml | cut -d ' ' -f 2 | tr -d '\r')
        if [ -z "$VERSION" ]; then
          echo "Warning: Could not extract version from pubspec.yaml, using default"
          VERSION="1.0.0+${{ github.event.inputs.build_number }}"
        fi
        APP_VERSION=${VERSION%+*}
        BUILD_NUMBER=${VERSION#*+}
        echo "Extracted version: $VERSION"
        echo "App version: $APP_VERSION"
        echo "Build number: $BUILD_NUMBER"
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "APP_VERSION=$APP_VERSION" >> $GITHUB_OUTPUT
        echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_OUTPUT
        
    # Step 5: Create test release
    - name: Create Test Release
      run: |
        echo "Preparing to create test GitHub release..."
        echo "Checking release files:"
        ls -la release-files/
        
        # Verify APK file exists
        APK_FILE="release-files/eventhub-ft-clean-release-${{ github.event.inputs.build_number }}.apk"
        if [ ! -f "$APK_FILE" ]; then
          echo "Error: APK file not found at $APK_FILE"
          exit 1
        fi
        echo "APK file confirmed: $APK_FILE"
        
        # Create the release using GitHub CLI
        gh release create "test-build-${{ github.event.inputs.build_number }}" \
          --title "EventHub Test Release #${{ github.event.inputs.build_number }}" \
          --notes "## EventHub Test Release #${{ github.event.inputs.build_number }}

        ### 📱 Download
        - **APK**: \`eventhub-ft-clean-release-${{ github.event.inputs.build_number }}.apk\`

        ### 🆕 Release Notes
        ${{ github.event.inputs.release_notes }}

        ### 📋 Installation Instructions
        1. Download the APK file to your Android device
        2. Enable \"Install from unknown sources\" in Settings → Security
        3. Tap the APK file to install
        4. Grant necessary permissions when prompted

        ### ⚙️ Build Information
        - **Version**: ${{ steps.version.outputs.VERSION }}
        - **Flutter**: ${{ env.FLUTTER_VERSION }}
        - **Java**: ${{ env.JAVA_VERSION }}
        - **Branch**: ft/clean
        - **Commit**: ${{ github.sha }}
        - **Original Build**: #${{ github.event.inputs.build_number }}

        ---
        **🧪 This is a test release** - Created to verify release functionality

        **🐛 Found an issue?** Report it on [GitHub Issues](../../issues)" \
          --prerelease \
          "$APK_FILE"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    # Step 6: Success notification
    - name: Success notification
      run: |
        echo "🎉 Test release created successfully!"
        echo "📱 APK is now available in GitHub Releases"
        echo "🔗 Check the Releases tab to download and test the APK"