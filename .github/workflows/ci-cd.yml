name: EventHub CI/CD Pipeline

# Workflow triggers - when this pipeline runs
on:
  push:
    branches: [ master ]            # Auto-build on push to master branch
  pull_request:
    branches: [ master ]            # Build APK for PR testing
  workflow_dispatch:               # Manual trigger for releases
    inputs:
      create_release:
        description: 'Create GitHub Release'
        required: false
        default: false
        type: boolean
      release_notes:
        description: 'Release notes (optional)'
        required: false
        default: 'Latest build from master branch'
        type: string

# Environment variables
env:
  FLUTTER_VERSION: '3.27.4'
  JAVA_VERSION: '17'

# Permissions for GitHub token
permissions:
  contents: write
  actions: read

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: ${{ env.JAVA_VERSION }}
        
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        cache: true
        
    - name: Get dependencies
      run: flutter pub get
      
    - name: Generate code
      run: flutter packages pub run build_runner build --delete-conflicting-outputs
      
    - name: Build Release APK
      run: flutter build apk --release
      
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: eventhub-master-release-${{ github.run_number }}
        path: build/app/outputs/flutter-apk/app-release.apk
        retention-days: 7
        


  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && github.ref == 'refs/heads/master') || github.event.inputs.create_release == 'true'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Download APK artifact
      uses: actions/download-artifact@v4
      with:
        name: eventhub-master-release-${{ github.run_number }}
        path: release-files/
        
    - name: Get version info
      id: version
      run: |
        VERSION=$(grep '^version:' pubspec.yaml | cut -d ' ' -f 2 | tr -d '\r')
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        
    - name: Create Release
      run: |
        APK_FILE="release-files/app-release.apk"
        
        gh release create "build-${{ github.run_number }}" \
          --title "EventHub Build #${{ github.run_number }}" \
          --notes "## EventHub Build #${{ github.run_number }}

        ### 📱 Download
        - **APK**: \`app-release.apk\`

        ### ⚙️ Build Information
        - **Version**: ${{ steps.version.outputs.VERSION }}
        - **Flutter**: ${{ env.FLUTTER_VERSION }}
        - **Java**: ${{ env.JAVA_VERSION }}
        - **Branch**: master
        - **Commit**: ${{ github.sha }}

        ### 📋 Installation Instructions
        1. Download the APK file to your Android device
        2. Enable \"Install from unknown sources\" in Settings → Security
        3. Tap the APK file to install" \
          --prerelease \
          "$APK_FILE"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}